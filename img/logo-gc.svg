<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <!-- Isometric cube -->
  <!-- Top face -->
  <polygon points="100,20 160,50 100,80 40,50" fill="#e8e4df" stroke="#333" stroke-width="1.2"/>
  <!-- Left face -->
  <polygon points="40,50 100,80 100,140 40,110" fill="#ddd9d3" stroke="#333" stroke-width="1.2"/>
  <!-- Right face -->
  <polygon points="100,80 160,50 160,110 100,140" fill="#f5f2ee" stroke="#333" stroke-width="1.2"/>
  <!-- Letter G on left face -->
  <text x="62" y="102" font-family="'Georgia', serif" font-size="36" font-weight="400" fill="#222" text-anchor="middle" transform="skewY(-5)">G</text>
  <!-- Letter C on right face -->
  <text x="138" y="102" font-family="'Georgia', serif" font-size="36" font-weight="400" fill="#222" text-anchor="middle" transform="skewY(5)">C</text>
  <!-- Text below -->
  <text x="100" y="160" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="9" letter-spacing="3" fill="#222" text-anchor="middle" font-weight="400">GRUPPO CONTRINO</text>
  <text x="100" y="174" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="6.5" fill="#666" text-anchor="middle" letter-spacing="1">project &amp; real estate    since 1930</text>
</svg>
